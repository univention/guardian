variables:
  APPCENTER_CONTROL_IMAGE: "docker-registry.knut.univention.de/knut/univention-appcenter-control"
  POETRY_VERSION: "2.2.1"
  UCS_VERSION: "505"
  UCS_RELEASE: "5.0"
  DEB_IMAGE: docker-registry.knut.univention.de/phahn/ucs-debbase:$UCS_VERSION
  UCSLINT_IMAGE: gitregistry.knut.univention.de/univention/ucs
  SCOPE: "guardian"
  DOCS_DIR: "docs/guardian-manual"
  DOC_TARGET_VERSION: "3.0"
  DOC_TARGET_NAME: "guardian-manual"
  DOC_TARGET_PATH: "$DOC_TARGET_NAME/$DOC_TARGET_VERSION"

# TODO: Fix the opa pre-commit hooks
lint-pre-commit:
  variables:
    SKIP: "opa-fmt,opa-check,opa-test,regal-lint-use-path"

pip-package-and-publish-with-uv:
  variables:
    RELEASE_VERSION: "0.1.0-dev"

.build-matrix: &build-matrix
  - IMAGE_NAME: "testrunner"
    DOCKERFILE_PATH: "docker/testrunner/Dockerfile"
  - IMAGE_NAME: "guardian-management-ui"
    DOCKERFILE_PATH: "management-ui/docker/Dockerfile"
  - IMAGE_NAME: "guardian-server"
    DOCKERFILE_PATH: "docker/guardian-server/Dockerfile"

.publish-matrix: &publish-matrix
  - IMAGE_NAME:
    - "guardian-opa"
  - IMAGE_NAME:
    - "guardian-management-ui"
  - IMAGE_NAME:
    - "guardian-authorization-api"
  - IMAGE_NAME:
    - "guardian-management-api"

container-build:
  parallel:
    matrix: *build-matrix
  variables:
    KANIKO_BUILD_CONTEXT: "${CI_PROJECT_DIR}"

container-malware-scan:
  parallel:
    matrix: *publish-matrix

push-image-external:
  parallel:
    matrix: *publish-matrix

container-sign-external:
  parallel:
    matrix: *publish-matrix

container-release-attestation:
  parallel:
    matrix: *publish-matrix

test:
  stage: test
  image: "${CI_REGISTRY_IMAGE}/testrunner:${RELEASE_VERSION}"
  variables:
    UV_PROJECT_ENVIRONMENT: "/opt/venv"
  script:
    - exit_code=0
    - >-
      uv run pytest guardian-lib/tests/ -lvv
      --cov=guardian_lib
      --cov-fail-under=100
      --cov-report=term-missing
      --junit-xml=guardian-lib/pytest-junit.xml
      || exit_code=1
    - >-
      uv run pytest authorization-api/tests/ -lvv
      --cov=guardian_authorization_api
      --cov-fail-under=100
      --cov-append
      --cov-report=term-missing
      --junit-xml=authorization-api/pytest-junit.xml
      || exit_code=1
    - >-
      uv run pytest management-api/tests/ -lvv
      --cov=guardian_management_api
      --cov-fail-under=100
      --cov-append
      --cov-report=term-missing
      --junit-xml=management-api/pytest-junit.xml
      || exit_code=1
    - uv run coverage xml -o coverage.xml
    - uv run coverage report
    - exit $exit_code
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  artifacts:
    paths:
      - "coverage.xml"
    reports:
      coverage_report:
        coverage_format: cobertura
        path: "coverage.xml"
      junit:
        - "guardian-lib/pytest-junit.xml"
        - "authorization-api/pytest-junit.xml"
        - "management-api/pytest-junit.xml"
    expire_in: "1 day"
    when: "always"

generate-filesystem-sbom:
  variables:
    FOLDER: "management-ui"

.generate_keycloak_script:
  stage: "build"
  image: gitregistry.knut.univention.de/univention/dev/internal/ucsschool-ci-utils/app-release:latest
  variables:
    APP_NAME: "guardian-authorization-api"
    CONFIGURE_KEYCLOAK_TEMPLATE: "appcenter-authz/includes/configure-keycloak.tmpl"
    KEYCLOAK_TEMP_FILE: "appcenter-authz/includes/keycloak_script.include"
  script:
    - ./appcenter-common/keycloak/generate-configure-keycloak.sh "$APP_NAME" "$CONFIGURE_KEYCLOAK_TEMPLATE" "$KEYCLOAK_TEMP_FILE"
  artifacts:
    paths:
      - ${KEYCLOAK_TEMP_FILE}

authz_keycloak_script:
  extends: .generate_keycloak_script

management_keycloak_script:
  extends: .generate_keycloak_script
  variables:
    APP_NAME: "guardian-management-api"
    CONFIGURE_KEYCLOAK_TEMPLATE: "appcenter-management/includes/configure-keycloak.tmpl"
    KEYCLOAK_TEMP_FILE: "appcenter-management/includes/keycloak_script.include"

management-ui_keycloak_script:
  extends: .generate_keycloak_script
  variables:
    APP_NAME: "guardian-management-ui"
    CONFIGURE_KEYCLOAK_TEMPLATE: "appcenter-management-ui/includes/configure-keycloak.tmpl"
    KEYCLOAK_TEMP_FILE: "appcenter-management-ui/includes/keycloak_script.include"

docs-linkcheck:
  extends: .sphinx-linkcheck-template
  rules:
    - changes:
      - $DOCS_DIR/**/*

docs-spelling:
  extends: .sphinx-spelling-template
  rules:
    - changes:
      - $DOCS_DIR/**/*

docs-html:
  extends: .sphinx-html-template
  rules:
    - changes:
      - $DOCS_DIR/**/*

docs-pdf:
  extends: .sphinx-pdf-template
  rules:
    - changes:
      - $DOCS_DIR/**/*

docs-merge-to-one-artifact:
  extends: .sphinx-merge-template
  stage: deploy
  needs:
    - job: docs-html
    - job: docs-pdf
    - job: docs-spelling
      artifacts: false
    - job: docs-linkcheck
      artifacts: false
  rules:
    - if: $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH
      changes:
      - $DOCS_DIR/**/*
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
      - $DOCS_DIR/**/*
      when: manual

docs-review:
  extends: .sphinx-review-template
  stage: deploy
  needs:
    - job: docs-merge-to-one-artifact
  rules:
    - changes:
      - $DOCS_DIR/**/*

# The template has inherit:variables:false to prevent the passing of pipeline
# variables to downstream, and therefore $DOCS_DIR is not available here.
docs-create-production-merge-request:
  extends: .sphinx-docs-merge-request-template
  stage: deploy
  needs:
    - job: docs-merge-to-one-artifact
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
      - docs/guardian-manual/**/*

sonarqube:
  extends: .sonarqube
  needs: [test]

include:
  - component: $CI_SERVER_FQDN/univention/dev/internal/ucsschool-ci-utils/app-release@2
    inputs:
      app_id: "guardian-authorization-api"
      job_prefix: "authz-"
      mail_sender: "nubus-core@univention.de"
      author_alias: "Nubus Core Team"
      changelog_link: "https://docs.software-univention.de/guardian-manual/latest/changelogs.html#authorization-api"
      mail_recipient: "app-announcement@univention.de"
      chat_destination: "#ucsschool"
      ucs_base_version: "5.0"
      additional_update_appcenter_needs:
        - job: "container-build"
          parallel:
            matrix:
              - IMAGE_NAME: "guardian-authorization-api"
                KANIKO_BUILD_CONTEXT: "${CI_PROJECT_DIR}/authorization-api"
          optional: true
        - job: "container-build"
          parallel:
            matrix:
              - IMAGE_NAME: "guardian-opa"
                KANIKO_BUILD_CONTEXT: "${CI_PROJECT_DIR}/opa"
          optional: true
        - authz_keycloak_script
      appcenter_file_dir: "appcenter-authz/"
      release_tag_prefix: "authorization-api_"
      build_stage: "package"
      release_stage: "publish"
      cleanup_stage: ".post"
  - component: $CI_SERVER_FQDN/univention/dev/internal/ucsschool-ci-utils/app-release@2
    inputs:
      app_id: "guardian-management-api"
      job_prefix: "management-"
      mail_sender: "nubus-core@univention.de"
      author_alias: "Nubus Core Team"
      changelog_link: "https://docs.software-univention.de/guardian-manual/latest/changelogs.html#management-api"
      mail_recipient: "app-announcement@univention.de"
      chat_destination: "#ucsschool"
      ucs_base_version: "5.0"
      additional_update_appcenter_needs:
        - management_keycloak_script
        - job: "container-build"
          parallel:
            matrix:
              - IMAGE_NAME: "guardian-management-api"
                KANIKO_BUILD_CONTEXT: "${CI_PROJECT_DIR}/management-api"
          optional: true
      appcenter_file_dir: "appcenter-management/"
      release_tag_prefix: "management-api_"
      build_stage: "package"
      release_stage: "publish"
      cleanup_stage: ".post"
  - component: $CI_SERVER_FQDN/univention/dev/internal/ucsschool-ci-utils/app-release@2
    inputs:
      app_id: "guardian-management-ui"
      job_prefix: "management-ui-"
      mail_sender: "nubus-core@univention.de"
      author_alias: "Nubus Core Team"
      changelog_link: "https://docs.software-univention.de/guardian-manual/latest/changelogs.html#management-ui"
      mail_recipient: "app-announcement@univention.de"
      chat_destination: "#ucsschool"
      ucs_base_version: "5.0"
      additional_update_appcenter_needs:
        - management-ui_keycloak_script
        - job: "container-build"
          parallel:
            matrix:
              - IMAGE_NAME: "guardian-management-ui"
                KANIKO_BUILD_CONTEXT: "${CI_PROJECT_DIR}"
                DOCKERFILE_PATH: "management-ui/docker/Dockerfile"
          optional: true
      appcenter_file_dir: "appcenter-management-ui/"
      release_tag_prefix: "management-ui_"
      build_stage: "package"
      release_stage: "publish"
      cleanup_stage: ".post"

  - component: $CI_SERVER_FQDN/univention/dev/nubus-for-k8s/common-ci/pip-package-and-publish-with-uv@v1.62.0
    inputs:
      package_root: "authorization-client"

  - project: 'univention/dev/docs/sphinx-docker'
    file: 'pipeline/sphinx.yml'
  - project: "univention/dev/nubus-for-k8s/common-ci"
    ref: "v1.62.0"
    file:
      - "defaults/stages.yaml"
      - "defaults/nubus-workflow.yaml"
      - "jobs/generate-filesystem-sbom.yaml"
      - "jobs/lint-pre-commit.yaml"
      - "jobs/lint-commit-messages.yaml"
      - "jobs/semantic-release-env.yaml"
      - "jobs/container-build-external.yaml"
      # - "jobs/package-and-publish-helm-charts-external.yaml"
      - "jobs/check-debian-updates.yaml"
      - "templates/pip-package-and-publish.yaml"
      - "templates/sonarqube.yaml"
  - project: "univention/infrastructure/docker-services"
    ref: "master"
    file:
      - "dind.yml"

variables:
  APPCENTER_CONTROL_IMAGE: "docker-registry.knut.univention.de/knut/univention-appcenter-control"
  POETRY_VERSION: "2.2.1"
  UCS_VERSION: "505"
  UCS_RELEASE: "5.0"
  DEB_IMAGE: docker-registry.knut.univention.de/phahn/ucs-debbase:$UCS_VERSION
  UCSLINT_IMAGE: gitregistry.knut.univention.de/univention/ucs
  SCOPE: "guardian"
  DOCS_DIR: "docs/guardian-manual"
  DOC_TARGET_VERSION: "3.0"
  DOC_TARGET_NAME: "guardian-manual"
  DOC_TARGET_PATH: "$DOC_TARGET_NAME/$DOC_TARGET_VERSION"

pip-package-and-publish-with-uv:
  variables:
    RELEASE_VERSION: "0.1.0-dev"

lint-pre-commit:
  extends: .lint-pre-commit
  variables:
    RUNNER_REGISTRY_IMAGE: "gitregistry.knut.univention.de/univention/dev/tooling/pre-commit/univention-pre-commit"
    RUNNER_IMAGE_TAG: "0.6.2"

.build-matrix: &build-matrix
  - IMAGE_NAME: "testrunner"
    DOCKERFILE_PATH: "docker/testrunner/Dockerfile"
  - IMAGE_NAME: "guardian-opa"
    KANIKO_BUILD_CONTEXT: "${CI_PROJECT_DIR}/opa"
  - IMAGE_NAME: "guardian-management-ui"
    DOCKERFILE_PATH: "management-ui/docker/Dockerfile"
  - IMAGE_NAME: "guardian-authorization-api"
    DOCKERFILE_PATH: "authorization-api/Dockerfile"
  - IMAGE_NAME: "guardian-management-api"
    DOCKERFILE_PATH: "management-api/Dockerfile"

.publish-matrix: &publish-matrix
  - IMAGE_NAME:
    - "guardian-opa"
  - IMAGE_NAME:
    - "guardian-management-ui"
  - IMAGE_NAME:
    - "guardian-authorization-api"
  - IMAGE_NAME:
    - "guardian-management-api"

container-build:
  parallel:
    matrix: *build-matrix
  variables:
    KANIKO_BUILD_CONTEXT: "${CI_PROJECT_DIR}"

container-malware-scan:
  parallel:
    matrix: *publish-matrix

push-image-external:
  parallel:
    matrix: *publish-matrix

container-sign-external:
  parallel:
    matrix: *publish-matrix

container-release-attestation:
  parallel:
    matrix: *publish-matrix

test:
  stage: test
  image: "${CI_REGISTRY_IMAGE}/testrunner:${RELEASE_VERSION}"
  variables:
    UV_PROJECT_ENVIRONMENT: "/opt/venv"
    COVERAGE_FILE: ".coverage.unit"
  script:
    - exit_code=0
    - >-
      uv run pytest guardian-lib/tests/ -lvv
      --cov=guardian_lib
      --cov-report=term-missing
      --junit-xml=guardian-lib/pytest-junit.xml
      || exit_code=1
    - >-
      uv run pytest authorization-api/tests/ -lvv
      --cov=guardian_authorization_api
      --cov-append
      --cov-report=term-missing
      --junit-xml=authorization-api/pytest-junit.xml
      || exit_code=1
    - >-
      uv run pytest management-api/tests/ -lvv
      --cov=guardian_management_api
      --cov-append
      --cov-report=term-missing
      --junit-xml=management-api/pytest-junit.xml
      || exit_code=1
    - uv run coverage report
    - exit $exit_code
  artifacts:
    paths:
      - ".coverage.unit"
      - "guardian-lib/pytest-junit.xml"
      - "authorization-api/pytest-junit.xml"
      - "management-api/pytest-junit.xml"
    reports:
      junit:
        - "guardian-lib/pytest-junit.xml"
        - "authorization-api/pytest-junit.xml"
        - "management-api/pytest-junit.xml"
    expire_in: "1 day"
    when: "always"

# Runs the e2e_udm-marked tests against a real Guardian stack
# (ldap-server, udm-rest-api, keycloak, opa, authz-api, management-api).
# Runs in parallel with `test`; coverage data files from both jobs are
# combined by the `coverage-merge` job below.
test-e2e:
  stage: test
  extends: .dind
  needs:
    - job: pre-semantic-release
    - job: container-build
      parallel:
        matrix:
          - IMAGE_NAME: "testrunner"
            DOCKERFILE_PATH: "docker/testrunner/Dockerfile"
          - IMAGE_NAME: "guardian-opa"
            KANIKO_BUILD_CONTEXT: "${CI_PROJECT_DIR}/opa"
          - IMAGE_NAME: "guardian-authorization-api"
            DOCKERFILE_PATH: "authorization-api/Dockerfile"
          - IMAGE_NAME: "guardian-management-api"
            DOCKERFILE_PATH: "management-api/Dockerfile"
  image: "${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/docker:24.0.7"
  variables:
    UCS_HOST_IP: "127.0.0.1"
    GUARDIAN_OPA_IMAGE: "${CI_REGISTRY_IMAGE}/guardian-opa:${RELEASE_VERSION}"
    GUARDIAN_AUTHORIZATION_API_IMAGE: "${CI_REGISTRY_IMAGE}/guardian-authorization-api:${RELEASE_VERSION}"
    GUARDIAN_MANAGEMENT_API_IMAGE: "${CI_REGISTRY_IMAGE}/guardian-management-api:${RELEASE_VERSION}"
    GUARDIAN_TESTRUNNER_IMAGE: "${CI_REGISTRY_IMAGE}/testrunner:${RELEASE_VERSION}"
  before_script:
    - unset DOCKER_API_VERSION
    # Same prep as dev-run: ensure the bind-mounted service dir exists,
    # pick up the runtime env (.env.example matches the in-compose URLs
    # we ship), and use a USER_ID that matches the runner.
    - mkdir -p management_service_dir
    - . ./.env.example
    - export USER_ID=$(id -u)
    # Materialize a docker-compose-compatible .env (KEY=VAL, no `export`)
    # so the test-runner service can pull it in via `env_file`.
    - sed 's/^[[:space:]]*export //' .env.example > .env
    # Resolve git.knut.univention.de via the runner's DNS so the local
    # docker compose build for services not in the container-build matrix
    # (keycloak, keycloak-provisioning) can reach the internal pypi.
    - apk add --no-cache bind-tools
    - export GITLAB_IP=$(dig +short git.knut.univention.de | head -n 1)
    - test -n "$GITLAB_IP" || { echo "Failed to resolve git.knut.univention.de"; exit 1; }
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    - docker compose -f dev-compose.yaml pull --policy missing management-api authorization-api opa ldap-server udm-rest-api
    - docker compose -f dev-compose.yaml up -d --wait --build management-api authorization-api opa proxy keycloak-provisioning ldap-server udm-rest-api
  script:
    - . ./.env.example
    - export USER_ID=$(id -u)
    - export GITLAB_IP=$(dig +short git.knut.univention.de | head -n 1)
    - exit_code=0
    # Coverage data and JUnit XML are written into /app/management-api,
    # which is bind-mounted into the test-runner from ./management-api on
    # the host, so they survive the --rm cleanup.
    - >-
      docker compose -f dev-compose.yaml run --rm
      -e COVERAGE_FILE=/app/management-api/.coverage.e2e
      test-runner
      uv run pytest management-api/tests/ -lvv
      -m e2e_udm
      --cov=guardian_management_api
      --cov-report=term-missing
      --junit-xml=/app/management-api/pytest-junit-e2e.xml
      || exit_code=1
    - mv management-api/.coverage.e2e .coverage.e2e
    - exit $exit_code
  after_script:
    - . ./.env.example
    - export USER_ID=$(id -u)
    - export GITLAB_IP=$(dig +short git.knut.univention.de 2>/dev/null | head -n 1)
    - docker compose -f dev-compose.yaml logs --no-color > docker-compose.log || true
    - docker compose -f dev-compose.yaml down -v --remove-orphans || true
  artifacts:
    paths:
      - ".coverage.e2e"
      - "docker-compose.log"
      - "management-api/pytest-junit-e2e.xml"
    reports:
      junit:
        - "management-api/pytest-junit-e2e.xml"
    expire_in: "1 day"
    when: "always"

# Merges the unit and e2e coverage data files into a single cobertura
# report and enforces the 100% threshold over the combined run.
coverage-merge:
  stage: test
  needs:
    - job: pre-semantic-release
    - job: test
      artifacts: true
    - job: test-e2e
      artifacts: true
  image: "${CI_REGISTRY_IMAGE}/testrunner:${RELEASE_VERSION}"
  variables:
    UV_PROJECT_ENVIRONMENT: "/opt/venv"
  script:
    - uv run coverage combine .coverage.unit .coverage.e2e
    - uv run coverage xml -o coverage.xml
    - uv run coverage report --fail-under=100
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  artifacts:
    paths:
      - "coverage.xml"
    reports:
      coverage_report:
        coverage_format: cobertura
        path: "coverage.xml"
    expire_in: "1 day"
    when: "always"

generate-filesystem-sbom:
  variables:
    FOLDER: "management-ui"

.generate_keycloak_script:
  stage: "build"
  image: gitregistry.knut.univention.de/univention/dev/internal/ucsschool-ci-utils/app-release:latest
  variables:
    APP_NAME: "guardian-authorization-api"
    CONFIGURE_KEYCLOAK_TEMPLATE: "appcenter-authz/includes/configure-keycloak.tmpl"
    KEYCLOAK_TEMP_FILE: "appcenter-authz/includes/keycloak_script.include"
  script:
    - ./appcenter-common/keycloak/generate-configure-keycloak.sh "$APP_NAME" "$CONFIGURE_KEYCLOAK_TEMPLATE" "$KEYCLOAK_TEMP_FILE"
  artifacts:
    paths:
      - ${KEYCLOAK_TEMP_FILE}

authz_keycloak_script:
  extends: .generate_keycloak_script

management_keycloak_script:
  extends: .generate_keycloak_script
  variables:
    APP_NAME: "guardian-management-api"
    CONFIGURE_KEYCLOAK_TEMPLATE: "appcenter-management/includes/configure-keycloak.tmpl"
    KEYCLOAK_TEMP_FILE: "appcenter-management/includes/keycloak_script.include"

management-ui_keycloak_script:
  extends: .generate_keycloak_script
  variables:
    APP_NAME: "guardian-management-ui"
    CONFIGURE_KEYCLOAK_TEMPLATE: "appcenter-management-ui/includes/configure-keycloak.tmpl"
    KEYCLOAK_TEMP_FILE: "appcenter-management-ui/includes/keycloak_script.include"

docs-linkcheck:
  extends: .sphinx-linkcheck-template
  rules:
    - changes:
      - $DOCS_DIR/**/*

docs-spelling:
  extends: .sphinx-spelling-template
  rules:
    - changes:
      - $DOCS_DIR/**/*

docs-html:
  extends: .sphinx-html-template
  rules:
    - changes:
      - $DOCS_DIR/**/*

docs-pdf:
  extends: .sphinx-pdf-template
  rules:
    - changes:
      - $DOCS_DIR/**/*

docs-merge-to-one-artifact:
  extends: .sphinx-merge-template
  stage: deploy
  needs:
    - job: docs-html
    - job: docs-pdf
    - job: docs-spelling
      artifacts: false
    - job: docs-linkcheck
      artifacts: false
  rules:
    - if: $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH
      changes:
      - $DOCS_DIR/**/*
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
      - $DOCS_DIR/**/*
      when: manual

docs-review:
  extends: .sphinx-review-template
  stage: deploy
  needs:
    - job: docs-merge-to-one-artifact
  rules:
    - changes:
      - $DOCS_DIR/**/*

# The template has inherit:variables:false to prevent the passing of pipeline
# variables to downstream, and therefore $DOCS_DIR is not available here.
docs-create-production-merge-request:
  extends: .sphinx-docs-merge-request-template
  stage: deploy
  needs:
    - job: docs-merge-to-one-artifact
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
      - docs/guardian-manual/**/*

sonarqube:
  extends: .sonarqube
  needs:
    - job: coverage-merge
      artifacts: true

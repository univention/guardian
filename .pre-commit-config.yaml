# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v5.0.0
  hooks:
    - id: check-added-large-files
      name: general-check-added-large-files
    - id: check-json
      name: general-check-json
    - id: check-xml
      name: general-check-xml
    - id: check-yaml
      name: general-check-yaml
      exclude: ^helm/.+/templates/
    - id: check-toml
      name: backend-check-toml
    - id: trailing-whitespace
      name: general-trailing-whitespace
    - id: pretty-format-json
      name: general-pretty-format-json
      args: [--autofix]
- repo: https://github.com/psf/black
  rev: 24.10.0
  hooks:
    - id: black
      name: backend-black
      exclude: "udm_client.py"
- repo: https://github.com/PyCQA/bandit
  rev: 1.7.10
  hooks:
    - id: bandit
      name: backend-bandit
      exclude: "authorization-api/tests/|management-api/tests|udm_client.py|guardian-lib/tests|authorization-client/tests"
- repo: https://github.com/pre-commit/mirrors-mypy
  rev: v1.13.0
  hooks:
    - id: mypy
      name: backend-mypy
      exclude: "docs/|authorization-api/tests/|management-api/tests|guardian-lib/tests|authorization-client/tests"
      args: []
      additional_dependencies: [pydantic>=2.0.0, pydantic-settings>=2.0.0, fastapi>=0.100.0, loguru==0.7.0, requests==2.31.0, types-requests==2.31.0, alembic==1.11.3, types-aiofiles, types-pymysql, types-PyYAML]
- repo: https://github.com/jackdewinter/pymarkdown
  rev: v0.9.25
  hooks:
    - id: pymarkdown
      name: general-markdown
      exclude: ".gitlab/issue_templates/|helm/|docs/project-context.md"
      args:
        - --disable-rules
        - MD013,MD024,MD034,MD041
        - scan
        # Rules pymarkdown: https://github.com/jackdewinter/pymarkdown/blob/main/docs/rules.md
        # Rules markdownlint: https://github.com/DavidAnson/markdownlint/blob/main/doc/Rules.md
        # MD013: Allow arbitrary line length
        # MD024: Allow duplicate headings
        # MD034: Allow bare URLs
        # MD041: First line in file should be a top level heading

- repo: https://github.com/charliermarsh/ruff-pre-commit
  rev: 'v0.8.0'
  hooks:
    - id: ruff
      name: backend-ruff
      args: [--fix]
      exclude: "udm_client.py"

- repo: https://github.com/anderseknert/pre-commit-opa
  rev: v1.5.1
  hooks:
    - id: opa-fmt
      name: backend-opa-fmt
      args: ["--v0-compatible"]
    - id: opa-check
      name: backend-opa-check-bundle-template
      args: ["management-api/rego_policy_bundle_template", "--v0-compatible"]
    - id: opa-check
      name: backend-opa-check-builtin-conditions
      args: ["management-api/alembic/1.0.0_builtin_conditions", "--ignore=\"*.json\""]
    - id: opa-test
      name: backend-opa-test-bundle-template
      args: ["management-api/rego_policy_bundle_template", "--v0-compatible"]
    - id: opa-test
      name: backend-opa-test-builtin-conditions
      args: ["management-api/alembic/1.0.0_builtin_conditions", "--ignore=\"*.json\"", "--v0-compatible"]

- repo: https://github.com/open-policy-agent/regal
  rev: v0.40.0
  hooks:
    - id: regal-lint-use-path
      name: backend-opa-policy-file-linting

- repo: local
  hooks:
    # Frontend
    - id: frontend-type-check
      name: frontend-type-check
      files: \.([jt]sx?|vue)$  # *.js, *.jsx, *.ts and *.tsx, as well as .vue
      types: [ file ]
      language: node
      entry: "yarn --cwd management-ui type-check"
      pass_filenames: false
      additional_dependencies:
        - "yarn"
    - id: frontend-lint
      name: frontend-lint
      files: \.([jt]sx?|vue)$  # *.js, *.jsx, *.ts and *.tsx, as well as .vue
      types: [ file ]
      language: node
      entry: "yarn --cwd management-ui lint"
      pass_filenames: false
      additional_dependencies:
        - "yarn"
    - id: frontend-format
      name: frontend-format
      files: \.([jt]sx?|vue)$  # *.js, *.jsx, *.ts and *.tsx, as well as .vue
      types: [ file ]
      language: node
      entry: "yarn --cwd management-ui format"
      pass_filenames: false
      additional_dependencies:
        - "yarn"
    # Backend
    - id: uv-lock-check
      name: backend-uv-lock-check
      language: system
      entry: uv lock --check
      pass_filenames: false
      files: ^(guardian-lib|authorization-api|management-api)/pyproject\.toml$
    - id: uv-lock-check-authorization-client
      name: backend-uv-lock-check-authorization-client
      language: system
      entry: uv lock --check --project authorization-client
      pass_filenames: false
      files: ^authorization-client/pyproject\.toml$
    - id: unittests-guardian-lib
      name: unittests-guardian-lib
      language: system
      entry: uv run pytest guardian-lib/tests/ -q
      pass_filenames: false
      files: ^guardian-lib/
    - id: unittests-authorization-api
      name: unittests-authorization-api
      language: system
      entry: uv run pytest authorization-api/tests/ -q
      pass_filenames: false
      files: ^(authorization-api|guardian-lib)/
    - id: unittests-management-api
      name: unittests-management-api
      language: system
      entry: uv run pytest management-api/tests/ -q
      pass_filenames: false
      files: ^(management-api|guardian-lib)/

exclude: ".claude|.opencode|_bmad*"

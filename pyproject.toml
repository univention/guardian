[tool.uv.workspace]
members = [
    "guardian-lib",
    "authorization-api",
    "management-api",
]

[tool.uv.sources]
guardian-lib = { workspace = true }

[[tool.uv.index]]
name = "port-loader"
url = "https://git.knut.univention.de/api/v4/projects/908/packages/pypi/simple"
explicit = true

[[tool.uv.index]]
name = "opa-client"
url = "https://git.knut.univention.de/api/v4/projects/688/packages/pypi/simple"
explicit = true

[tool.pytest.ini_options]
markers = [
    "integration: marks test as requiring services outside of the guardian",
    "in_container_test: marked test is relying on services outside the authorization-api (e.g.: opa)",
    "e2e: marks test that test the routes with full integration",
    "e2e_udm: marks test that need an UDM instance",
]
filterwarnings = ["ignore::DeprecationWarning:gunicorn.util:25"]
env = ["GUARDIAN__MANAGEMENT__BASE_URL=http://localhost:8001"]

[tool.coverage.run]
omit = [
    "*/guardian_management_api/ports/*",
    "*/guardian_authorization_api/udm_client.py",
    # Those omits should be removed, once integration tests are added.
    # See univention/components/authorization-engine/guardian#32
    "*/guardian_management_api/routers/condition.py",
    "*/guardian_management_api/routers/custom_endpoint.py",
    "*/guardian_management_api/routers/permission.py",
]
relative_files = true

# The `test` job runs pytest in the testrunner image with the repo
# checked out at the GitLab runner workspace (/builds/.../guardian),
# while the `test-e2e` job runs pytest inside the management-api
# container with the source bind-mounted at /app. These aliases let
# `coverage combine` canonicalize both data files so `coverage xml`
# can read the source from a single location.
[tool.coverage.paths]
guardian_lib = [
    "guardian-lib/guardian_lib",
    "*/guardian-lib/guardian_lib",
]
authorization_api = [
    "authorization-api/guardian_authorization_api",
    "*/authorization-api/guardian_authorization_api",
]
management_api = [
    "management-api/guardian_management_api",
    "*/management-api/guardian_management_api",
]

[tool.coverage.report]
show_missing = true
skip_covered = true

# Regal linter configuration
# See https://docs.styra.com/regal/category/configuration

rules:
  idiomatic:
    # Directory structure doesn't match package names by design in this project
    directory-package-mismatch:
      level: ignore
    # No entrypoint annotations needed - policies are bundled at runtime
    no-defined-entrypoint:
      level: ignore
  imports:
    # Using direct rule imports is intentional in this codebase
    prefer-package-imports:
      level: ignore
    # Imports are resolved at runtime when policies are bundled together
    unresolved-import:
      level: ignore
    unresolved-reference:
      level: ignore
  testing:
    # Print statements in test files are intentional for debugging
    print-or-trace-call:
      level: ignore
  style:
    # The codebase uses camelCase for some variables (e.g., roleCapabilityMapping)
    prefer-snake-case:
      level: ignore
    # Test rules can be long due to comprehensive test cases
    rule-length:
      level: ignore
  performance:
    # These are suggestions, not critical issues
    defer-assignment:
      level: ignore
    non-loop-expression:
      level: ignore
  bugs:
    # The existence check pattern is intentional in this codebase
    redundant-existence-check:
      level: ignore

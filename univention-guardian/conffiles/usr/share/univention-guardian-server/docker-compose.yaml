services:
  guardian-server:
    container_name: guardian-server
    image: ghcr.io/cerbos/cerbos:0.53.0@sha256:c3fe64202e3793b7e9c41c5cbfcf390a51fb28ebce0a7d70754155e70db839c4
    # Cerbos is built FROM scratch (static binary, no /etc/passwd), so UID must be numeric.
    # guardian-server system user is created with this fixed UID by the Debian package postinst.
    user: "64110:64110"
    cap_drop:
      - ALL
    read_only: true
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:3593:3593"
    volumes:
      - /usr/share/univention-guardian-server/policies:/policies:ro
      - /usr/share/univention-guardian-server/config:/config:ro
    command: ["server", "--log-level=@%@guardian/cerbos/log-level@%@", "--config=/config/config.yaml"]
    restart: unless-stopped
    networks:
      - guardian-internal

networks:
  guardian-internal:
    driver: bridge

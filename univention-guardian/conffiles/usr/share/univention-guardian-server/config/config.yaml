# https://docs.cerbos.dev/cerbos/latest/configuration/index.html

server:
  httpListenAddr: ":3592"
  playgroundEnabled: false
  apiExplorerEnabled: false
  requestLimits:
    maxActionsPerResource: 100
    maxResourcesPerRequest: 50

storage:
  driver: "disk"
  disk:
    directory: "/policies"
    watchForChanges: true

schema:
  enforcement: reject

telemetry:
  disabled: true

http_address = "0.0.0.0:8593"

provider        = "keycloak-oidc"
oidc_issuer_url = "@%@cerbos/keycloak/issuer-url@%@"
client_id       = "@%@cerbos/keycloak/client-id@%@"
client_secret   = "_PLACEHOLDER_NOT_USED_IN_BEARER_MODE_"

# cookie_secret comes from OAUTH2_PROXY_COOKIE_SECRET (env_file in compose).

skip_jwt_bearer_tokens = true
force_json_errors      = true

# All paths are API: 401 on invalid token, no login redirect.
api_routes = ["^/"]

# Service-account tokens (client_credentials grant) don't have an email
# claim; key off preferred_username instead.
oidc_email_claim = "preferred_username"
email_domains    = ["*"]

upstreams = [
  "http://cerbos-server:3592/"
]

# Forward the bearer for Cerbos's auxData.jwt to re-parse.
pass_authorization_header = true
set_authorization_header  = true

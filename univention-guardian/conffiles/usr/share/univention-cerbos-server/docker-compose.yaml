services:
  cerbos-server:
    container_name: cerbos-server
    image: ghcr.io/cerbos/cerbos:0.46.0
    ports:
      - "127.0.0.1:3592:3592"
    volumes:
      - /usr/share/univention-cerbos-server/policies:/policies:ro
      - /usr/share/univention-cerbos-server/config:/config:ro
      # Trust the UCS root CA so JWKS fetches over HTTPS work.
      - /etc/univention/ssl/ucsCA/CAcert.pem:/etc/ssl/certs/ucs-ca.pem:ro
    environment:
      SSL_CERT_FILE: /etc/ssl/certs/ucs-ca.pem
    command: ["server", "--log-level=WARN", "--config=/config/config.yaml"]
    restart: unless-stopped
    networks:
      - cerbos-internal

@!@
if configRegistry.is_true('cerbos/authentication', False):
    print("""\
  cerbos-oidc-proxy:
    container_name: cerbos-oidc-proxy
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.8.2
    depends_on:
      - cerbos-server
    ports:
      - "0.0.0.0:8593:8593"
    env_file:
      - /etc/univention/cerbos-server.secret
    volumes:
      - /usr/share/univention-cerbos-server/proxy:/proxy:ro
      - /etc/univention/ssl/ucsCA/CAcert.pem:/etc/ssl/certs/ucs-ca.pem:ro
    environment:
      SSL_CERT_FILE: /etc/ssl/certs/ucs-ca.pem
    command: ["--config=/proxy/oauth2-proxy.cfg"]
    restart: unless-stopped
    networks:
      - cerbos-internal""")
@!@

networks:
  cerbos-internal:
    driver: bridge

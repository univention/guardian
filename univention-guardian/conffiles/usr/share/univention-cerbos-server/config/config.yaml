# https://docs.cerbos.dev/cerbos/latest/configuration/index.html

server:
  # Docker-compose binds this to 127.0.0.1 on the host.
  httpListenAddr: ":3592"
  playgroundEnabled: false
  apiExplorerEnabled: false
  requestLimits:
    maxActionsPerResource: 100
    maxResourcesPerRequest: 50

storage:
  driver: "disk"
  disk:
    directory: "/policies"
    watchForChanges: true

# Re-verify the bearer the proxy forwarded so claims are usable in
# policies as request.auxData.jwt.claims.* (defense-in-depth).
@!@
if configRegistry.is_true('cerbos/authentication', False):
    import yaml
    block = {'auxData': {'jwt': {'keySets': [{
        'id': 'keycloak',
        'remote': {'url': configRegistry.get('cerbos/keycloak/jwks-url', '')},
    }]}}}
    print(yaml.safe_dump(block, default_flow_style=False, sort_keys=False).rstrip())
@!@

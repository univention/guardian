# yaml-language-server: $schema=https://api.cerbos.dev/latest/cerbos/policy/v1/TestSuite.schema.json

name: Test ouadmin role with context
description: Tests context

principals:

  sally:
    id: sally
    roles:
      - user

  ian:
    id: ian
    roles:
      - ouadmin
    attr:
      assignments:
       - role: ouadmin
         context: hamburg
       - role: ouadmin
         context: bremen

  frank:
    id: frank
    roles:
      - ouadmin
    attr:
      assignments:
       - role: ouadmin
         context: hamburg

  james:
    id: james
    roles:
      - ouadmin
      - helpdesk

resources:
  resource1:
    id: user1
    kind: user
    attr:
      position: hamburg
  resource2:
    id: user2
    kind: user
    attr:
      position: bremen
  resource3:
    id: user3
    kind: user
    attr:
      position: berlin

tests:

  - name: bremen hamburg, not berlin
    input:
      principals:
        - ian
      resources:
        - resource1
        - resource2
        - resource3
      actions:
        - modify_user
    expected:
      - principal: ian
        resource: resource1
        actions:
          modify_user: EFFECT_ALLOW
      - principal: ian
        resource: resource2
        actions:
          modify_user: EFFECT_ALLOW
      - principal: ian
        resource: resource3
        actions:
          modify_user: EFFECT_DENY


  - name: hamburg, not berlin or bremen
    input:
      principals:
        - frank
      resources:
        - resource1
        - resource2
        - resource3
      actions:
        - modify_user
    expected:
      - principal: frank
        resource: resource1
        actions:
          modify_user: EFFECT_ALLOW
      - principal: frank
        resource: resource2
        actions:
          modify_user: EFFECT_DENY
      - principal: frank
        resource: resource3
        actions:
          modify_user: EFFECT_DENY

  - name: no role
    input:
      principals:
        - sally
      resources:
        - resource1
        - resource2
        - resource3
      actions:
        - modify_user
    expected:
      - principal: sally
        resource: resource1
        actions:
          modify_user: EFFECT_DENY
      - principal: sally
        resource: resource2
        actions:
          modify_user: EFFECT_DENY
      - principal: sally
        resource: resource3
        actions:
          modify_user: EFFECT_DENY

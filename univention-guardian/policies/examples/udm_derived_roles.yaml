apiVersion: api.cerbos.dev/v1

derivedRoles:
  name: udm_derived_roles

  definitions:
    - name: helpdesk_context
      parentRoles:
        - helpdesk
      condition:
        match:
          expr: request.principal.attr.assignments.exists(a,
                  a.role == "helpdesk" &&
                  a.context == request.resource.attr.position)
